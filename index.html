<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ubuntu Web Terminal (Simulated) - GitHub Pages</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #2e3436;
            font-family: 'Ubuntu Mono', 'Cascadia Code', 'Consolas', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .terminal-wrapper {
            width: 95vw;
            max-width: 1200px;
            height: 90vh;
            background: #300a24;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .terminal-header {
            background: #2c001e;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            color: #eee;
            font-size: 13px;
            border-bottom: 1px solid #5e2750;
        }
        .terminal-body {
            flex: 1;
            background: #300a24;
            overflow-y: auto;
            padding: 12px;
            color: #f0f0f0;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .terminal-body::-webkit-scrollbar {
            width: 8px;
        }
        .terminal-body::-webkit-scrollbar-track {
            background: #2c001e;
        }
        .terminal-body::-webkit-scrollbar-thumb {
            background: #5e2750;
            border-radius: 4px;
        }
        .input-line {
            display: flex;
            align-items: center;
            background: #300a24;
            border-top: 1px solid #5e2750;
            padding: 10px 12px;
        }
        .prompt {
            color: #8ae234;
            white-space: nowrap;
            margin-right: 8px;
            font-weight: 500;
        }
        .cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #f0f0f0;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .status {
            background: #2c001e;
            padding: 4px 12px;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #5e2750;
            display: flex;
            justify-content: space-between;
        }
        button {
            background: #5e2750;
            border: none;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .output-line {
            margin-bottom: 2px;
        }
        .error {
            color: #ef2929;
        }
        .success {
            color: #8ae234;
        }
    </style>
</head>
<body>
<div class="terminal-wrapper">
    <div class="terminal-header">
        <span>🐧 user@ubuntu: ~</span>
        <span>Ubuntu 22.04 LTS (Simulated Terminal)</span>
    </div>
    <div class="terminal-body" id="outputArea"></div>
    <div class="input-line">
        <span class="prompt" id="prompt">user@ubuntu:~$</span>
        <input type="text" class="cmd-input" id="commandInput" autofocus spellcheck="false" autocomplete="off">
    </div>
    <div class="status">
        <span>✔ Session saved in browser | Commands: help, ls, cd, apt install, python3, nano, etc.</span>
        <button id="resetBtn">⟳ Reset Session</button>
    </div>
</div>

<script>
    // ---------- SIMULATED UBUNTU FILESYSTEM (with localStorage persistence) ----------
    let fs = {
        type: 'dir',
        children: {
            'home': {
                type: 'dir',
                children: {
                    'user': {
                        type: 'dir',
                        children: {
                            'Desktop': { type: 'dir', children: {} },
                            'Documents': { type: 'dir', children: {} },
                            'Downloads': { type: 'dir', children: {} },
                            '.bashrc': { type: 'file', content: '# User bashrc\nPS1="\\u@\\h:\\w\\$ "' }
                        }
                    }
                }
            },
            'etc': {
                type: 'dir',
                children: {
                    'os-release': { type: 'file', content: 'NAME="Ubuntu"\nVERSION="22.04 LTS"' }
                }
            },
            'tmp': { type: 'dir', children: {} },
            'hello.txt': { type: 'file', content: 'Hello from simulated Ubuntu!' }
        }
    };

    // Simulated installed packages (apt)
    let installedPackages = new Set(['base-files', 'bash', 'coreutils', 'grep', 'sed', 'apt']);

    // Current working directory (array of path segments)
    let currentPath = ['home', 'user'];
    let commandHistory = [];
    let historyIndex = -1;

    // DOM elements
    const outputDiv = document.getElementById('outputArea');
    const commandInput = document.getElementById('commandInput');
    const promptSpan = document.getElementById('prompt');
    const resetBtn = document.getElementById('resetBtn');

    // Helper: get node from path array
    function getNode(pathArr) {
        let current = fs;
        for (let seg of pathArr) {
            if (current.type !== 'dir') return null;
            if (!current.children[seg]) return null;
            current = current.children[seg];
        }
        return current;
    }

    // Helper: format path for prompt
    function formatPrompt() {
        const homePath = ['home', 'user'];
        let displayPath;
        if (currentPath.length >= homePath.length && currentPath.slice(0, homePath.length).join('/') === homePath.join('/')) {
            let rel = currentPath.slice(homePath.length);
            displayPath = rel.length === 0 ? '~' : '~/' + rel.join('/');
        } else if (currentPath.length === 0) {
            displayPath = '/';
        } else {
            displayPath = '/' + currentPath.join('/');
        }
        return `user@ubuntu:${displayPath}$`;
    }

    // Resolve path (supports ., .., ~, /)
    function resolvePath(input, currentArr) {
        if (!input || input.trim() === "") return currentArr;
        let working;
        if (input === '~') {
            working = ['home', 'user'];
        } else if (input.startsWith('/')) {
            working = input.slice(1).split('/').filter(p => p !== '');
        } else {
            working = [...currentArr];
            const parts = input.split('/');
            for (let part of parts) {
                if (part === '' || part === '.') continue;
                if (part === '..') {
                    if (working.length > 0) working.pop();
                    else return null;
                } else {
                    working.push(part);
                }
            }
        }
        return working;
    }

    // Save filesystem and packages to localStorage
    function saveSession() {
        localStorage.setItem('ubuntu_fs', JSON.stringify(fs));
        localStorage.setItem('ubuntu_currentPath', JSON.stringify(currentPath));
        localStorage.setItem('ubuntu_installedPackages', JSON.stringify([...installedPackages]));
    }

    // Load session from localStorage
    function loadSession() {
        const savedFS = localStorage.getItem('ubuntu_fs');
        if (savedFS) {
            fs = JSON.parse(savedFS);
        }
        const savedPath = localStorage.getItem('ubuntu_currentPath');
        if (savedPath) {
            currentPath = JSON.parse(savedPath);
        }
        const savedPkgs = localStorage.getItem('ubuntu_installedPackages');
        if (savedPkgs) {
            installedPackages = new Set(JSON.parse(savedPkgs));
        }
    }

    // Reset session (clear all data)
    function resetSession() {
        localStorage.removeItem('ubuntu_fs');
        localStorage.removeItem('ubuntu_currentPath');
        localStorage.removeItem('ubuntu_installedPackages');
        // Reload page to reset completely
        location.reload();
    }

    // Append output to terminal
    function appendOutput(text, type = 'normal') {
        const line = document.createElement('div');
        line.className = 'output-line';
        if (type === 'error') line.classList.add('error');
        else if (type === 'success') line.classList.add('success');
        line.textContent = text;
        outputDiv.appendChild(line);
        outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    function appendCommand(cmd) {
        const line = document.createElement('div');
        line.className = 'output-line';
        line.innerHTML = `<span style="color:#8ae234;">${formatPrompt()}</span> <span style="color:#fff;">${escapeHtml(cmd)}</span>`;
        outputDiv.appendChild(line);
        outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function clearScreen() {
        outputDiv.innerHTML = '';
    }

    // Command processing
    function processCommand(cmdLine) {
        const trimmed = cmdLine.trim();
        if (trimmed === "") return;

        appendCommand(trimmed);

        const parts = trimmed.split(/\s+/);
        const command = parts[0].toLowerCase();
        const args = parts.slice(1);

        // ----- HELP -----
        if (command === 'help') {
            appendOutput("Available commands (simulated Ubuntu):", 'success');
            appendOutput("  help, ls, cd, pwd, mkdir, rmdir, touch, rm, cat, echo, clear", 'normal');
            appendOutput("  nano (simulated editor), sudo, apt install <pkg>, apt update", 'normal');
            appendOutput("  python3, pip3, git, wget (simulated output)", 'normal');
            appendOutput("  whoami, hostname, uname -a, date, history", 'normal');
            appendOutput("  exit (closes terminal simulation)", 'normal');
            return;
        }

        // ----- CLEAR -----
        if (command === 'clear') {
            clearScreen();
            return;
        }

        // ----- PWD -----
        if (command === 'pwd') {
            const full = currentPath.length === 0 ? '/' : '/' + currentPath.join('/');
            appendOutput(full);
            return;
        }

        // ----- LS -----
        if (command === 'ls') {
            const targetPath = args[0] ? resolvePath(args[0], currentPath) : currentPath;
            if (!targetPath) {
                appendOutput("ls: cannot access: invalid path", 'error');
                return;
            }
            const node = getNode(targetPath);
            if (!node || node.type !== 'dir') {
                appendOutput("ls: not a directory", 'error');
                return;
            }
            const items = Object.keys(node.children);
            if (items.length === 0) appendOutput("(empty)");
            else {
                // Colorize directories
                const colored = items.map(name => {
                    const isDir = node.children[name].type === 'dir';
                    return isDir ? `\x1b[1;34m${name}\x1b[0m` : name;
                });
                appendOutput(colored.join('  '));
            }
            return;
        }

        // ----- CD -----
        if (command === 'cd') {
            const target = args[0] || '~';
            const newPath = resolvePath(target, currentPath);
            if (newPath === null) {
                appendOutput("cd: invalid path", 'error');
                return;
            }
            const node = getNode(newPath);
            if (node && node.type === 'dir') {
                currentPath = newPath;
                promptSpan.innerText = formatPrompt();
                saveSession();
            } else {
                appendOutput(`cd: ${target}: No such directory`, 'error');
            }
            return;
        }

        // ----- MKDIR -----
        if (command === 'mkdir') {
            const dirName = args[0];
            if (!dirName) {
                appendOutput("mkdir: missing operand", 'error');
                return;
            }
            const targetPath = [...currentPath, dirName];
            if (getNode(targetPath)) {
                appendOutput(`mkdir: cannot create directory '${dirName}': File exists`, 'error');
                return;
            }
            const parent = getNode(currentPath);
            if (parent && parent.type === 'dir') {
                parent.children[dirName] = { type: 'dir', children: {} };
                saveSession();
                appendOutput(`Directory created: ${dirName}`, 'success');
            } else {
                appendOutput("mkdir: cannot create directory", 'error');
            }
            return;
        }

        // ----- RMDIR -----
        if (command === 'rmdir') {
            const dirName = args[0];
            if (!dirName) {
                appendOutput("rmdir: missing operand", 'error');
                return;
            }
            const targetPath = [...currentPath, dirName];
            const node = getNode(targetPath);
            if (!node || node.type !== 'dir') {
                appendOutput(`rmdir: failed to remove '${dirName}': Not a directory`, 'error');
                return;
            }
            if (Object.keys(node.children).length > 0) {
                appendOutput(`rmdir: failed to remove '${dirName}': Directory not empty`, 'error');
                return;
            }
            const parent = getNode(currentPath);
            delete parent.children[dirName];
            saveSession();
            appendOutput(`Directory removed: ${dirName}`, 'success');
            return;
        }

        // ----- TOUCH -----
        if (command === 'touch') {
            const fileName = args[0];
            if (!fileName) {
                appendOutput("touch: missing file operand", 'error');
                return;
            }
            const targetPath = [...currentPath, fileName];
            const existing = getNode(targetPath);
            if (existing) {
                // Update timestamp (simulated)
                appendOutput(`File touched: ${fileName}`);
            } else {
                const parent = getNode(currentPath);
                if (parent && parent.type === 'dir') {
                    parent.children[fileName] = { type: 'file', content: '' };
                    saveSession();
                    appendOutput(`File created: ${fileName}`, 'success');
                } else {
                    appendOutput("touch: cannot create file", 'error');
                }
            }
            return;
        }

        // ----- RM -----
        if (command === 'rm') {
            const fileName = args[0];
            if (!fileName) {
                appendOutput("rm: missing operand", 'error');
                return;
            }
            const targetPath = [...currentPath, fileName];
            const node = getNode(targetPath);
            if (!node) {
                appendOutput(`rm: cannot remove '${fileName}': No such file`, 'error');
                return;
            }
            if (node.type === 'dir' && !args.includes('-r')) {
                appendOutput(`rm: cannot remove '${fileName}': Is a directory (use -r)`, 'error');
                return;
            }
            const parent = getNode(currentPath);
            delete parent.children[fileName];
            saveSession();
            appendOutput(`Removed: ${fileName}`, 'success');
            return;
        }

        // ----- CAT -----
        if (command === 'cat') {
            const fileName = args[0];
            if (!fileName) {
                appendOutput("cat: missing file operand", 'error');
                return;
            }
            const targetPath = [...currentPath, fileName];
            const node = getNode(targetPath);
            if (!node || node.type !== 'file') {
                appendOutput(`cat: ${fileName}: No such file`, 'error');
                return;
            }
            appendOutput(node.content);
            return;
        }

        // ----- ECHO -----
        if (command === 'echo') {
            let text = args.join(' ');
            // handle > redirection (simple)
            if (text.includes('>')) {
                const partsRedir = text.split('>');
                const content = partsRedir[0].trim();
                const targetFile = partsRedir[1].trim();
                if (targetFile) {
                    const parent = getNode(currentPath);
                    if (parent && parent.type === 'dir') {
                        parent.children[targetFile] = { type: 'file', content: content };
                        saveSession();
                        appendOutput(`Written to ${targetFile}`, 'success');
                    } else {
                        appendOutput("echo: cannot write", 'error');
                    }
                    return;
                }
            }
            appendOutput(text);
            return;
        }

        // ----- NANO (simulated simple editor) -----
        if (command === 'nano') {
            const fileName = args[0];
            if (!fileName) {
                appendOutput("nano: missing filename", 'error');
                return;
            }
            const targetPath = [...currentPath, fileName];
            let fileContent = "";
            const existing = getNode(targetPath);
            if (existing && existing.type === 'file') {
                fileContent = existing.content;
            }
            // Simple inline editor prompt
            appendOutput(`[Simulated nano] Editing: ${fileName}. Enter new content (end with line containing 'EOF'):`, 'success');
            // We'll use a multiline input hack – but for simplicity, just a prompt.
            // Better: use window.prompt for quick edit.
            const newContent = prompt(`Editing ${fileName}\nCurrent content:\n${fileContent}\n\nEnter new content (OK to save, Cancel to abort):`, fileContent);
            if (newContent !== null) {
                const parent = getNode(currentPath);
                if (parent && parent.type === 'dir') {
                    parent.children[fileName] = { type: 'file', content: newContent };
                    saveSession();
                    appendOutput(`File saved: ${fileName}`, 'success');
                } else {
                    appendOutput("nano: cannot save", 'error');
                }
            } else {
                appendOutput("Edit cancelled", 'normal');
            }
            return;
        }

        // ----- SUDO (just a passthrough with fake privilege) -----
        if (command === 'sudo') {
            if (args.length === 0) {
                appendOutput("sudo: missing command", 'error');
                return;
            }
            const restCmd = args.join(' ');
            appendOutput("[sudo] password for user: (simulated)");
            // Re-run the command without sudo (just for simulation)
            processCommand(restCmd);
            return;
        }

        // ----- APT (simulated package management) -----
        if (command === 'apt') {
            const sub = args[0];
            if (sub === 'update') {
                appendOutput("Hit:1 http://archive.ubuntu.com/ubuntu jammy InRelease", 'normal');
                appendOutput("Reading package lists... Done", 'success');
                return;
            }
            if (sub === 'install') {
                const pkg = args[1];
                if (!pkg) {
                    appendOutput("apt install: missing package name", 'error');
                    return;
                }
                if (installedPackages.has(pkg)) {
                    appendOutput(`${pkg} is already the newest version.`, 'normal');
                    return;
                }
                // Simulate download & install
                appendOutput(`Reading package lists... Done`, 'normal');
                appendOutput(`Building dependency tree... Done`, 'normal');
                appendOutput(`The following NEW packages will be installed:\n  ${pkg}`, 'normal');
                appendOutput(`0 upgraded, 1 newly installed, 0 to remove and 0 not upgraded.`, 'normal');
                setTimeout(() => {
                    appendOutput(`Processing triggers for man-db...`, 'normal');
                    appendOutput(`Setting up ${pkg} (simulated)...`, 'success');
                    installedPackages.add(pkg);
                    saveSession();
                    appendOutput(`Successfully installed ${pkg}.`, 'success');
                }, 500);
                return;
            }
            if (sub === 'remove') {
                const pkg = args[1];
                if (pkg && installedPackages.has(pkg)) {
                    installedPackages.delete(pkg);
                    saveSession();
                    appendOutput(`Removed ${pkg}.`, 'success');
                } else {
                    appendOutput(`Package ${pkg} not installed.`, 'error');
                }
                return;
            }
            appendOutput(`apt: unknown subcommand ${sub}`, 'error');
            return;
        }

        // ----- PYTHON3 simulation -----
        if (command === 'python3') {
            if (args[0] === '--version') {
                appendOutput("Python 3.10.12");
            } else if (args[0] === '-c') {
                appendOutput("Python code execution simulated. Output: (no actual execution)");
            } else {
                appendOutput("Python 3.10.12 (main, Nov 20 2023, 15:14:05) [GCC 11.4.0] on linux\nType \"help\", \"copyright\", \"credits\" or \"license\" for more information.", 'normal');
                appendOutput(">>> (simulated interactive shell not available; use 'python3 -c \"code\"')", 'normal');
            }
            return;
        }

        // ----- GIT simulation -----
        if (command === 'git') {
            appendOutput("git version 2.34.1 (simulated)");
            appendOutput("Command not fully simulated, but you can pretend it works.");
            return;
        }

        // ----- WGET simulation -----
        if (command === 'wget') {
            const url = args[0];
            if (url) {
                appendOutput(`--${new Date().toISOString()}--  ${url}`);
                appendOutput(`Resolving ${url.split('/')[2]}... done.`, 'normal');
                appendOutput(`HTTP request sent, awaiting response... 200 OK`, 'success');
                appendOutput(`Saving to: 'downloaded_file'`, 'normal');
                appendOutput(`Simulated download complete.`, 'success');
            } else {
                appendOutput("wget: missing URL", 'error');
            }
            return;
        }

        // ----- WHOAMI -----
        if (command === 'whoami') {
            appendOutput("user");
            return;
        }

        // ----- HOSTNAME -----
        if (command === 'hostname') {
            appendOutput("ubuntu-sim");
            return;
        }

        // ----- UNAME -----
        if (command === 'uname') {
            if (args[0] === '-a') {
                appendOutput("Linux ubuntu-sim 5.15.0-86-generic #96-Ubuntu SMP x86_64 GNU/Linux");
            } else {
                appendOutput("Linux");
            }
            return;
        }

        // ----- DATE -----
        if (command === 'date') {
            appendOutput(new Date().toString());
            return;
        }

        // ----- HISTORY -----
        if (command === 'history') {
            if (commandHistory.length === 0) appendOutput("No commands in history.");
            else commandHistory.forEach((c, i) => appendOutput(`  ${i+1}  ${c}`));
            return;
        }

        // ----- EXIT (simulate exit)-----
        if (command === 'exit') {
            appendOutput("logout\n[Process completed - refresh page to restart session]", 'success');
            commandInput.disabled = true;
            return;
        }

        // Default: command not found
        appendOutput(`${command}: command not found`, 'error');
    }

    // Handle input
    function handleCommand() {
        const cmd = commandInput.value;
        if (cmd.trim() !== "") {
            commandHistory.push(cmd);
            if (commandHistory.length > 100) commandHistory.shift();
            processCommand(cmd);
        }
        commandInput.value = '';
        historyIndex = -1;
        saveSession();
    }

    commandInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            handleCommand();
            e.preventDefault();
        }
    });

    // History navigation
    commandInput.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (commandHistory.length === 0) return;
            if (historyIndex === -1) historyIndex = commandHistory.length - 1;
            else if (historyIndex > 0) historyIndex--;
            commandInput.value = commandHistory[historyIndex];
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex !== -1) {
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    commandInput.value = commandHistory[historyIndex];
                } else {
                    historyIndex = -1;
                    commandInput.value = '';
                }
            }
        }
    });

    // Load session and show welcome
    loadSession();
    promptSpan.innerText = formatPrompt();
    appendOutput("Ubuntu 22.04 LTS (Simulated Terminal)", 'success');
    appendOutput("Type 'help' for available commands. Your files and packages persist across reloads!", 'normal');
    appendOutput(`Last login: ${new Date().toLocaleString()}`, 'normal');
    appendOutput("");

    resetBtn.addEventListener('click', () => {
        if (confirm("Reset all session data? This will delete all files and installed packages.")) {
            resetSession();
        }
    });

    // Focus on click
    document.body.addEventListener('click', () => commandInput.focus());
</script>
</body>
</html>
