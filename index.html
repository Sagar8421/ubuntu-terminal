<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Django Terminal Simulator (No Backend)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a0c10 0%, #0f1117 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            padding: 20px;
        }
        .terminal-container {
            width: 95vw;
            max-width: 1300px;
            height: 85vh;
            min-height: 550px;
            background: #0C0C0C;
            border-radius: 12px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .terminal-header {
            background: #1e1e1e;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2d2d2d;
        }
        .window-controls {
            display: flex;
            gap: 8px;
        }
        .win-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .win-btn.close { background: #e81123; }
        .win-btn.minimize { background: #f5a623; }
        .win-btn.maximize { background: #28a745; }
        .terminal-title {
            color: #cccccc;
            font-size: 13px;
            flex: 1;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .terminal-screen {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.5;
            scroll-behavior: smooth;
        }
        .terminal-screen::-webkit-scrollbar {
            width: 8px;
        }
        .terminal-screen::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        .terminal-screen::-webkit-scrollbar-thumb {
            background: #4e4e4e;
            border-radius: 4px;
        }
        .terminal-entry {
            margin-bottom: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .command-line {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 8px;
            color: #f0f0f0;
        }
        .prompt {
            color: #3b9b6e;
            font-weight: 500;
            white-space: nowrap;
        }
        .command-text {
            color: #dcdcdc;
        }
        .output-line {
            color: #bbbbbb;
            margin-left: 12px;
            border-left: 2px solid #2a6e44;
            padding-left: 12px;
            margin-top: 2px;
            margin-bottom: 2px;
        }
        .error-line {
            color: #f48771;
            border-left-color: #d16949;
        }
        .sim-server-line {
            color: #8bc34a;
        }
        .input-line {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0C0C0C;
            padding: 8px 16px 12px 16px;
            border-top: 1px solid #202020;
        }
        .input-prompt {
            color: #3b9b6e;
            font-weight: bold;
            white-space: nowrap;
        }
        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #f0f0f0;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            caret-color: #3b9b6e;
        }
        .server-status {
            background: #1e1e1e;
            padding: 4px 12px;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #2d2d2d;
            display: flex;
            justify-content: space-between;
        }
        .server-badge {
            color: #f5a623;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    // ---------- Virtual Django Project Filesystem ----------
    const createInitialVFS = () => ({
        type: 'dir',
        children: {
            'manage.py': {
                type: 'file',
                content: `#!/usr/bin/env python
"""Django's command-line utility."""
import sys
def main():
    print("Django management script (simulated)")
if __name__ == '__main__':
    main()`
            },
            'requirements.txt': { type: 'file', content: 'Django==4.2.0\nasgiref==3.7.2\nsqlparse==0.4.4' },
            'myproject': {
                type: 'dir',
                children: {
                    '__init__.py': { type: 'file', content: '' },
                    'settings.py': { type: 'file', content: '"""Django settings"""\nSECRET_KEY="dummy"\nDEBUG=True\nALLOWED_HOSTS=["*"]' },
                    'urls.py': { type: 'file', content: 'urlpatterns = []' },
                    'wsgi.py': { type: 'file', content: 'application = None' }
                }
            },
            'app1': {
                type: 'dir',
                children: {
                    '__init__.py': { type: 'file', content: '' },
                    'models.py': { type: 'file', content: 'from django.db import models\n\nclass Item(models.Model):\n    name = models.CharField(max_length=100)' },
                    'views.py': { type: 'file', content: 'from django.http import HttpResponse\n\ndef home(request):\n    return HttpResponse("Hello from app1")' }
                }
            }
        }
    });

    const cloneVFS = (vfs) => JSON.parse(JSON.stringify(vfs));

    // Path resolution (simple, works with / and \)
    const resolvePath = (pathStr, currentPathArr) => {
        if (!pathStr || pathStr.trim() === "") return currentPathArr;
        let raw = pathStr.trim();
        let isAbsolute = raw.startsWith('/') || raw.startsWith('\\');
        let parts = raw.split(/[\\/]/).filter(p => p !== "" && p !== ".");
        let working = isAbsolute ? [] : [...currentPathArr];
        for (let part of parts) {
            if (part === "..") {
                if (working.length > 0) working.pop();
                else return null;
            } else if (part !== ".") {
                working.push(part);
            }
        }
        return working;
    };

    const getNode = (vfs, pathArr) => {
        let current = vfs;
        for (let seg of pathArr) {
            if (current.type !== 'dir') return null;
            if (!current.children[seg]) return null;
            current = current.children[seg];
        }
        return current;
    };

    const formatPath = (pathArr) => pathArr.length ? '/' + pathArr.join('/') : '/';

    // Simulated server state
    let serverRunning = false;
    let serverPort = null;
    let serverInterval = null;
    let serverOutputLines = [];

    // Command handlers (returns { outputLines, newVfs, newPath, serverAction? })
    const handleCommand = (cmd, currentPathArr, vfs) => {
        const parts = cmd.trim().split(/\s+/);
        const command = parts[0].toLowerCase();
        const args = parts.slice(1);
        let output = [];
        let newVfs = vfs;
        let newPath = [...currentPathArr];

        // Built-in help
        if (command === 'help') {
            output = [
                "Django Terminal Simulator - Available commands:",
                "  help                               Show this help",
                "  ls / dir                           List directory contents",
                "  cd <dir>                           Change directory",
                "  cat <file>                         Show file content",
                "  django-admin startproject <name>   Create a new Django project",
                "  python manage.py runserver [port]  Start simulated Django server",
                "  python manage.py makemigrations    Simulate making migrations",
                "  python manage.py migrate           Simulate applying migrations",
                "  python manage.py shell              Enter simulated Django shell",
                "  echo <text>                        Print text",
                "  clear / cls                        Clear screen",
                "  stopserver                         Stop the running server"
            ];
        }
        else if (command === 'clear' || command === 'cls') {
            return { outputLines: [], newVfs, newPath, clear: true };
        }
        else if (command === 'ls' || command === 'dir') {
            const node = getNode(newVfs, newPath);
            if (!node || node.type !== 'dir') output = ["Not a directory"];
            else {
                const items = Object.keys(node.children);
                if (items.length === 0) output = ["(empty)"];
                else output = items.map(name => {
                    const type = node.children[name].type === 'dir' ? '<DIR>' : '    ';
                    return `${type}  ${name}`;
                });
            }
        }
        else if (command === 'cd') {
            const target = args[0];
            if (!target) output = [`Current: ${formatPath(newPath)}`];
            else {
                const newPathArr = resolvePath(target, newPath);
                if (newPathArr === null) output = ["Invalid path"];
                else {
                    const node = getNode(newVfs, newPathArr);
                    if (node && node.type === 'dir') newPath = newPathArr;
                    else output = [`cd: ${target}: No such directory`];
                }
            }
        }
        else if (command === 'cat') {
            const fileName = args[0];
            if (!fileName) output = ["cat: missing file operand"];
            else {
                const targetPath = [...newPath, fileName];
                const node = getNode(newVfs, targetPath);
                if (!node || node.type !== 'file') output = [`File not found: ${fileName}`];
                else output = [node.content];
            }
        }
        else if (command === 'django-admin') {
            if (args[0] === 'startproject' && args[1]) {
                const projName = args[1];
                if (getNode(newVfs, [...newPath, projName])) {
                    output = [`Directory ${projName} already exists`];
                } else {
                    newVfs = cloneVFS(newVfs);
                    const parent = getNode(newVfs, newPath);
                    if (parent && parent.type === 'dir') {
                        parent.children[projName] = {
                            type: 'dir',
                            children: {
                                'manage.py': { type: 'file', content: `#!/usr/bin/env python\n# Django manage.py stub for ${projName}` },
                                `${projName}`: { type: 'dir', children: {
                                    '__init__.py': { type: 'file', content: '' },
                                    'settings.py': { type: 'file', content: 'SECRET_KEY="dummy"\nDEBUG=True' },
                                    'urls.py': { type: 'file', content: 'urlpatterns = []' },
                                    'wsgi.py': { type: 'file', content: '' }
                                } }
                            }
                        };
                        output = [`Project '${projName}' created successfully (simulated)`];
                    } else output = ["Invalid directory"];
                }
            } else {
                output = ["Usage: django-admin startproject <project_name>"];
            }
        }
        else if (command === 'python' && args[0] === 'manage.py') {
            const subcmd = args[1];
            if (subcmd === 'runserver') {
                const port = args[2] || '8000';
                if (serverRunning) {
                    output = [`Server already running on port ${serverPort}. Use 'stopserver' first.`];
                } else {
                    serverRunning = true;
                    serverPort = port;
                    serverOutputLines = [];
                    // Simulate server startup logs
                    output = [
                        `Watching for file changes with StatReloader`,
                        `Performing system checks...`,
                        ``,
                        `System check identified no issues (0 silenced).`,
                        `Django version 4.2.0, using settings 'myproject.settings'`,
                        `Starting development server at http://127.0.0.1:${port}/`,
                        `Quit the server with Ctrl+C or type 'stopserver'.`
                    ];
                    // Start simulated periodic logs
                    if (serverInterval) clearInterval(serverInterval);
                    serverInterval = setInterval(() => {
                        if (serverRunning) {
                            const fakeLog = `[${new Date().toLocaleTimeString()}] "GET / HTTP/1.1" 200 12`;
                            serverOutputLines.push(fakeLog);
                            // This will be appended to terminal via callback (we'll set up a state callback later)
                            if (window.appendServerOutput) window.appendServerOutput(fakeLog);
                        } else {
                            clearInterval(serverInterval);
                            serverInterval = null;
                        }
                    }, 5000);
                }
            }
            else if (subcmd === 'makemigrations') {
                output = [
                    `Migrations for 'app1':`,
                    `  apps/app1/migrations/0001_initial.py`,
                    `    - Create model Item`,
                    `No changes detected in other apps.`
                ];
            }
            else if (subcmd === 'migrate') {
                output = [
                    `Operations to perform:`,
                    `  Apply all migrations: admin, auth, contenttypes, sessions, app1`,
                    `Running migrations:`,
                    `  Applying app1.0001_initial... OK`,
                    `  Applying contenttypes.0001_initial... OK`,
                    `  Applying auth.0001_initial... OK`,
                    `  Applying admin.0001_initial... OK`,
                    `  Applying sessions.0001_initial... OK`
                ];
            }
            else if (subcmd === 'shell') {
                output = [
                    `Python 3.11.0 (simulated)`,
                    `Django 4.2.0`,
                    `Type "help", "copyright", "credits" for more information.`,
                    `(InteractiveConsole)`,
                    `>>> from app1.models import Item`,
                    `>>> Item.objects.all()`,
                    `<QuerySet []>`,
                    `>>> exit()`
                ];
            }
            else {
                output = [`Unknown manage.py command: ${subcmd}`];
            }
        }
        else if (command === 'stopserver') {
            if (serverRunning) {
                serverRunning = false;
                if (serverInterval) clearInterval(serverInterval);
                serverInterval = null;
                output = [`Development server stopped on port ${serverPort}.`];
                serverPort = null;
            } else {
                output = [`No server is currently running.`];
            }
        }
        else if (command === 'echo') {
            output = [args.join(' ') || ''];
        }
        else {
            output = [`Command not recognized: ${command}. Type 'help' for available commands.`];
        }

        return { outputLines: output, newVfs, newPath, clear: false };
    };

    // Main React Component
    const DjangoTerminal = () => {
        const [entries, setEntries] = React.useState([]);
        const [currentPath, setCurrentPath] = React.useState([]);
        const [vfs, setVfs] = React.useState(() => createInitialVFS());
        const [inputValue, setInputValue] = React.useState("");
        const [serverActive, setServerActive] = React.useState(false);
        const [history, setHistory] = React.useState([]);
        const [historyIndex, setHistoryIndex] = React.useState(-1);
        
        const terminalRef = React.useRef(null);
        const inputRef = React.useRef(null);

        // Callback for server to append logs
        React.useEffect(() => {
            window.appendServerOutput = (logLine) => {
                setEntries(prev => [...prev, {
                    id: Date.now() + '_server',
                    type: 'output',
                    lines: [`[Server] ${logLine}`],
                    serverStyle: true
                }]);
                setTimeout(() => {
                    if (terminalRef.current) terminalRef.current.scrollTop = terminalRef.current.scrollHeight;
                }, 50);
            };
            return () => { delete window.appendServerOutput; };
        }, []);

        // Check server state periodically
        React.useEffect(() => {
            const interval = setInterval(() => {
                setServerActive(serverRunning);
            }, 500);
            return () => clearInterval(interval);
        }, []);

        // Welcome message
        React.useEffect(() => {
            const welcome = [
                "Django Terminal Simulator (No Backend Required)",
                "Run Django commands in a simulated environment.",
                "Type 'help' to see all commands.",
                "Try: django-admin startproject blog",
                "Try: python manage.py runserver",
                "------------------------------------------------"
            ];
            setEntries([{ id: Date.now(), type: 'output', lines: welcome }]);
            inputRef.current?.focus();
        }, []);

        React.useEffect(() => {
            if (terminalRef.current) {
                terminalRef.current.scrollTop = terminalRef.current.scrollHeight;
            }
        }, [entries]);

        const handleSubmit = (e) => {
            e.preventDefault();
            const cmd = inputValue.trim();
            if (cmd === "") {
                setInputValue("");
                return;
            }
            // Add to history
            setHistory(prev => [...prev, cmd]);
            setHistoryIndex(-1);
            
            // Add command entry
            const promptStr = formatPath(currentPath);
            const cmdEntry = {
                id: Date.now() + '_cmd',
                type: 'command',
                prompt: promptStr,
                text: cmd
            };
            
            // Process command
            const { outputLines, newVfs, newPath, clear } = handleCommand(cmd, currentPath, vfs);
            
            if (clear) {
                setEntries([]);
                setVfs(newVfs);
                setCurrentPath(newPath);
                setInputValue("");
                return;
            }
            
            const outEntry = {
                id: Date.now() + '_out',
                type: 'output',
                lines: outputLines.length ? outputLines : ["(no output)"]
            };
            
            setEntries(prev => [...prev, cmdEntry, outEntry]);
            setVfs(newVfs);
            setCurrentPath(newPath);
            setInputValue("");
        };

        const handleKeyDown = (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (history.length === 0) return;
                let idx = historyIndex === -1 ? history.length - 1 : historyIndex - 1;
                if (idx >= 0) {
                    setHistoryIndex(idx);
                    setInputValue(history[idx]);
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex !== -1) {
                    let idx = historyIndex + 1;
                    if (idx >= history.length) {
                        setHistoryIndex(-1);
                        setInputValue("");
                    } else {
                        setHistoryIndex(idx);
                        setInputValue(history[idx]);
                    }
                }
            }
        };

        return (
            <div className="terminal-container">
                <div className="terminal-header">
                    <div className="window-controls">
                        <div className="win-btn close"></div>
                        <div className="win-btn minimize"></div>
                        <div className="win-btn maximize"></div>
                    </div>
                    <div className="terminal-title">🐍 Django Terminal Simulator (Frontend Only)</div>
                </div>
                <div className="terminal-screen" ref={terminalRef}>
                    {entries.map(entry => (
                        <div key={entry.id} className="terminal-entry">
                            {entry.type === 'command' && (
                                <div className="command-line">
                                    <span className="prompt">{entry.prompt}$</span>
                                    <span className="command-text">{entry.text}</span>
                                </div>
                            )}
                            {entry.type === 'output' && entry.lines.map((line, idx) => (
                                <div key={idx} className={`output-line ${entry.serverStyle ? 'sim-server-line' : (line.includes('Error') || line.includes('not recognized') ? 'error-line' : '')}`}>
                                    {line}
                                </div>
                            ))}
                        </div>
                    ))}
                </div>
                <form onSubmit={handleSubmit} className="input-line">
                    <span className="input-prompt">{formatPath(currentPath)}$</span>
                    <input
                        ref={inputRef}
                        type="text"
                        className="terminal-input"
                        value={inputValue}
                        onChange={(e) => setInputValue(e.target.value)}
                        onKeyDown={handleKeyDown}
                        autoFocus
                        spellCheck={false}
                        autoComplete="off"
                    />
                </form>
                <div className="server-status">
                    <span>🐍 Django Simulator</span>
                    <span className="server-badge">{serverActive ? `▶ Server running on port ${serverPort} (simulated)` : "⏹ Server stopped"}</span>
                </div>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<DjangoTerminal />);
</script>
</body>
</html>
